# TestcontainerEx project configuration
#
# Container engine host resolution order (built-in, no custom code needed):
#   1. CONTAINER_ENGINE_HOST env var (generic, preferred)
#   2. DOCKER_HOST env var (backward compatible)
#   3. tc.host or docker.host in ~/.testcontainer_ex.properties
#   4. .env file (CONTAINER_ENGINE_HOST or DOCKER_HOST)
#   5. Standard socket paths (Podman rootless/rootful, Docker, Colima, etc.)
#
# Override examples:
#   export CONTAINER_ENGINE_HOST=unix:///run/podman/podman.sock
#   export DOCKER_HOST=unix:///var/run/docker.sock

# Disable Ryuk auto-cleanup (we manage containers manually in test setup)
ryuk.disabled=true
# Pull images if not present locally
pull.policy=always
