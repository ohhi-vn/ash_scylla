# TestcontainerEx project configuration
#
# Default container engine: Podman
# Podman is the primary supported engine for integration tests.
#
# Container engine host resolution order (built-in, no custom code needed):
#   1. CONTAINER_ENGINE_HOST env var (preferred)
#   2. Podman rootless socket: unix:///run/user/$UID/podman/podman.sock
#   3. Podman rootful socket: unix:///run/podman/podman.sock
#
# Override example:
#   export CONTAINER_ENGINE_HOST=unix:///run/podman/podman.sock
#
# To use Apple Container instead:
#   export CONTAINER_ENGINE=apple_container

# Disable Ryuk auto-cleanup (we manage containers manually in test setup)
ryuk.disabled=true
# Pull images if not present locally
pull.policy=always
# Default engine: Podman
container.engine=podman
