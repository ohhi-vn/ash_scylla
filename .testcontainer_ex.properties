# TestcontainerEx project configuration
# Auto-detects Docker/Podman socket from environment or standard locations.
# Override DOCKER_HOST env var to point to your container runtime socket.
# Examples:
#   Docker:  unix:///var/run/docker.sock
#   Podman:  unix:///Users/<user>/.colima/default/docker.sock
#   Colima:  unix:///Users/<user>/.colima/default/docker.sock

# Disable Ryuk auto-cleanup (we manage containers manually in test setup)
ryuk.disabled=true
# Pull images if not present locally
pull.policy=always
