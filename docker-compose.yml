version: '3.8'

services:
  scylladb:
    image: scylladb/scylla:latest
    container_name: ash_scylla_test
    ports:
      - "9042:9042"
    volumes:
      - scylla_data:/var/lib/scylla
    command: --smp 1 --memory 1G
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'SELECT now() FROM system.local'"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  scylla_data:
