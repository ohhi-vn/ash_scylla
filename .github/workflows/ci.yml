name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      scylla:
        image: scylladb/scylla:latest
        ports:
          - 9042:9042
        options: >-
          --health-cmd "cqlsh -e 'SELECT now() FROM system.local'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.17'
          otp-version: '27'

      - name: Install dependencies
        run: mix deps.get

      - name: Run Credo
        run: mix credo --strict

      - name: Run unit tests
        run: mix test --exclude integration

      - name: Run integration tests
        run: mix test test/scylla_integration_test.exs
        env:
          SCYLLA_HOST: localhost
          SCYLLA_PORT: 9042
